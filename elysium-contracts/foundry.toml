[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = ["lib"]

solc = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
localhost = "http://localhost:8545"

[etherscan]
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://sepolia-explorer.arbitrum.io/api" }

[fuzz]
runs = 200

[invariant]
runs = 1000
depth = 100

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 1000 }